<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" fill="none" role="img" aria-labelledby="t">
  <title id="t">State-level public health data: scale, compliance, and analytics</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="40%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.15"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L8 4 L0 8 Z" fill="white" fill-opacity="0.5"/>
    </marker>
  </defs>
  <rect width="1600" height="400" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="8" fill="url(#gold)"/>
  <!-- State outline hint (abstract) -->
  <path d="M180 320 L220 120 L380 100 L520 140 L580 90 L720 110 L780 200 L920 180 L1040 220 L1180 160 L1320 200 L1420 140 L1500 180 L1520 320 Z" fill="#0c4a6e" fill-opacity="0.25" stroke="white" stroke-opacity="0.2" stroke-width="1.5"/>
  <!-- Network / data nodes -->
  <g stroke="white" stroke-opacity="0.25" stroke-width="1.5" fill="white" fill-opacity="0.4">
    <circle cx="340" cy="200" r="8"/>
    <circle cx="520" cy="160" r="8"/>
    <circle cx="700" cy="220" r="8"/>
    <circle cx="880" cy="180" r="8"/>
    <circle cx="1060" cy="200" r="8"/>
    <circle cx="1240" cy="170" r="8"/>
    <line x1="340" y1="200" x2="520" y2="160"/>
    <line x1="520" y1="160" x2="700" y2="220"/>
    <line x1="700" y1="220" x2="880" y2="180"/>
    <line x1="880" y1="180" x2="1060" y2="200"/>
    <line x1="1060" y1="200" x2="1240" y2="170"/>
  </g>
  <!-- Pipeline / ETL -->
  <g transform="translate(200 95)" opacity="0.75">
    <rect x="0" y="140" width="100" height="24" rx="6" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3"/>
    <path d="M110 152 L150 152" stroke="white" stroke-opacity="0.4" stroke-width="3" marker-end="url(#arr)"/>
    <rect x="160" y="130" width="100" height="44" rx="6" fill="white" fill-opacity="0.22" stroke="white" stroke-opacity="0.35"/>
    <path d="M270 152 L310 152" stroke="white" stroke-opacity="0.4" stroke-width="3"/>
    <rect x="320" y="110" width="100" height="64" rx="6" fill="white" fill-opacity="0.28" stroke="white" stroke-opacity="0.4"/>
  </g>
  <!-- Caduceus-inspired minimal -->
  <g transform="translate(1280 120)" opacity="0.35" stroke="white" stroke-width="3" stroke-linecap="round">
    <line x1="40" y1="0" x2="40" y2="160"/>
    <path d="M40 40 Q80 20 80 60 Q80 100 40 80"/>
    <path d="M40 40 Q0 20 0 60 Q0 100 40 80"/>
  </g>
</svg>
